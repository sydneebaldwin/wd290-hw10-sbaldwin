<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/script.js" defer></script>
  </head>
  <body>
    
    <main class="container">
      <div class="col-1">
      <h1>Rock, Paper, Scissors!</h1>
      <p class="subtitle">Choose Your Weapon:</p>

      <section class="choices" aria-label="Player choices">
        <button class="choice" data-choice="rock" type="button">Rock</button>
        <button class="choice" data-choice="paper" type="button">Paper</button>
        <button class="choice" data-choice="scissors" type="button">Scissors</button>
      </section>

      <section class="status" aria-live="polite">
        <div>
        <p>Player: <span id="playerChoice">—</span></p>
        <p>Computer: <span id="computerChoice">—</span></p>
        </div>
        <p id="result">Start the Game!</p>
      </section>
    </div>

    <div class="divider"></div>

    <section class="scoreboard" aria-label="Scoreboard">
      <h4>stats</h4>
  <p>Games: <br><span id="games">0</span></p>
  <p>Player wins: <br><span id="playerWins">0</span></p>
  <p>Computer wins: <br><span id="computerWins">0</span></p>
  <p>Ties: <br><span id="ties">0</span></p>
</section>

    </main>
  </body>
</html>
